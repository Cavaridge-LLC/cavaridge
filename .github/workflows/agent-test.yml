name: Agent Simulation Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/agents/**"
      - "packages/agent-core/**"
      - "packages/agent-runtime/**"
      - "packages/agent-test/**"
      - "packages/domain-agents/**"

jobs:
  agent-test:
    name: Agent Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Type check agent-test package
        run: pnpm --filter @cavaridge/agent-test check

      - name: Validate seed scenario YAML
        run: |
          node --input-type=module -e "
            import { ScenarioLoader } from './packages/agent-test/src/scenario-loader.js';
            const loader = new ScenarioLoader();
            const scenarios = loader.loadDirectory('./packages/agent-test/scenarios');
            console.log('Loaded ' + scenarios.length + ' scenarios from seed batteries');

            const categories = {};
            for (const s of scenarios) {
              categories[s.category] = (categories[s.category] || 0) + 1;
            }
            console.log('By category:', JSON.stringify(categories, null, 2));

            const agents = {};
            for (const s of scenarios) {
              agents[s.agentId] = (agents[s.agentId] || 0) + 1;
            }
            console.log('By agent:', JSON.stringify(agents, null, 2));

            // Validate all scenario IDs are unique
            const ids = scenarios.map(s => s.id);
            const dupes = ids.filter((id, i) => ids.indexOf(id) !== i);
            if (dupes.length > 0) {
              console.error('Duplicate scenario IDs:', dupes);
              process.exit(1);
            }

            console.log('All scenario IDs unique. Validation passed.');
          "

      - name: Type check dependent packages
        continue-on-error: true
        run: |
          pnpm --filter @cavaridge/agent-core check
          pnpm --filter @cavaridge/agent-runtime check
          pnpm --filter @cavaridge/domain-agents check
