# Cavaridge — Reusable CI Workflow
# Other repos call this with:
#   uses: cavaridge/cvg-core/.github/workflows/ci-shared.yml@main
#
# Version: 1.0.0
# Date: 2026-03-04

name: Cavaridge CI (Shared)

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        default: "20"
        type: string
      run-lint:
        description: "Run linting step"
        required: false
        default: true
        type: boolean
      run-typecheck:
        description: "Run TypeScript type checking"
        required: false
        default: true
        type: boolean
      run-tests:
        description: "Run test suite"
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: ${{ inputs.run-lint }}
        run: npm run lint --if-present

      - name: Typecheck
        if: ${{ inputs.run-typecheck }}
        run: npm run typecheck --if-present

      - name: Test
        if: ${{ inputs.run-tests }}
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Check for hardcoded client references
        run: |
          echo "Scanning for hardcoded client references..."
          if grep -ri "dedicated.it\|hardcoded.dit" src/ 2>/dev/null; then
            echo "❌ Found DIT/client references in source code"
            exit 1
          fi
          echo "✅ No hardcoded client references found"

      - name: Verify LICENSE exists
        run: |
          if [ ! -f "LICENSE" ]; then
            echo "❌ LICENSE file missing"
            exit 1
          fi
          if ! grep -q "Cavaridge" LICENSE; then
            echo "❌ LICENSE does not assert Cavaridge ownership"
            exit 1
          fi
          echo "✅ LICENSE file valid"

      - name: Verify .env is gitignored
        run: |
          if ! grep -q "^\.env$" .gitignore 2>/dev/null; then
            echo "❌ .env is not in .gitignore"
            exit 1
          fi
          echo "✅ .env is gitignored"
