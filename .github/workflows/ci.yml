name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Type Check, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Type check
        continue-on-error: true
        run: pnpm check

      - name: Lint
        continue-on-error: true
        run: pnpm lint

      - name: Test
        continue-on-error: true
        run: pnpm test

  compliance:
    name: Cavaridge Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No hardcoded client refs
        continue-on-error: true
        run: |
          if grep -r "Dedicated IT" --include="*.ts" --include="*.tsx" --include="*.js" apps/ packages/ 2>/dev/null; then
            echo "WARNING: Hardcoded DIT references found — scheduled for tenant isolation refactor"
            exit 1
          fi

      - name: No plaintext secrets
        run: |
          if grep -rE "(sk-[a-zA-Z0-9]{20,}|eyJhbGciOi)" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" apps/ packages/ 2>/dev/null; then
            echo "ERROR: Potential plaintext secrets found"
            exit 1
          fi

      - name: .env gitignored
        run: |
          if git ls-files --cached | grep -E "^(apps|packages)/.*\.env$"; then
            echo "ERROR: .env files are tracked in git"
            exit 1
          fi
