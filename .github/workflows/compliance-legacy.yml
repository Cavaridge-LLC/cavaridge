name: Governance Compliance Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run compliance check
        run: |
          chmod +x ./scripts/compliance-check.sh
          ./scripts/compliance-check.sh
