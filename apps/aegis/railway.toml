[build]
dockerfilePath = "../../Dockerfile.aegis"
watchPatterns = ["apps/aegis/**", "packages/auth/**", "packages/spaniel/**", "packages/agents/**", "packages/agent-core/**", "packages/tenant-intel/**", "packages/connector-core/**", "packages/config/**", "packages/security/**"]

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
