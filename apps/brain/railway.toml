[build]
dockerfilePath = "../../Dockerfile.brain"
watchPatterns = ["apps/brain/**", "packages/auth/**", "packages/spaniel/**", "packages/agents/**", "packages/agent-core/**", "packages/config/**"]

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
