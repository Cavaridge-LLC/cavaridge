[build]
dockerfilePath = "../../Dockerfile.ducky"
watchPatterns = ["apps/ducky/**", "packages/spaniel/**", "packages/auth/**", "packages/agents/**", "packages/agent-core/**", "packages/agent-runtime/**", "packages/domain-agents/**", "packages/ducky-animations/**", "packages/config/**"]

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
