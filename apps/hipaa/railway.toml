[build]
dockerfilePath = "../../Dockerfile.hipaa"
watchPatterns = ["apps/hipaa/**", "packages/auth/**", "packages/spaniel/**", "packages/agents/**", "packages/agent-core/**", "packages/domain-agents/**", "packages/config/**"]

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
